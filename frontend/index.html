<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Product Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-12">

    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">📦 Fast Product Browser</h1>
            
            <div class="flex items-center gap-2">
                <label for="categoryFilter" class="text-sm font-medium text-gray-600">Filter by Category:</label>
                <select id="categoryFilter" class="bg-white border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Home & Kitchen">Home & Kitchen</option>
                    <option value="Books">Books</option>
                    <option value="Beauty">Beauty</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

        <div class="mt-12 flex flex-col items-center justify-center gap-2">
            <button id="loadMoreBtn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-lg shadow transition duration-150 ease-in-out transform active:scale-95 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Load More Products
            </button>
            <div id="loadingSpinner" class="hidden text-gray-500 font-medium animate-pulse">
                Loading matching items...
            </div>
            <div id="noMoreContainer" class="hidden text-gray-400 text-sm italic mt-2">
                You've reached the end of the catalog!
            </div>
        </div>
    </main>

    <div id="detailsModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl border border-gray-100 overflow-hidden transform transition-all duration-300 scale-95 opacity-0" id="modalContent">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span id="modalCategory" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-800 mb-2"></span>
                        <h2 id="modalName" class="text-xl font-bold text-gray-900"></h2>
                    </div>
                    <span id="modalId" class="text-xs font-mono text-gray-400"></span>
                </div>
                <hr class="border-gray-100 my-4">
                <div class="space-y-3">
                    <p class="text-sm text-gray-500"><strong class="text-gray-700">Database Entry Sync:</strong> <span id="modalDate"></span></p>
                    <p class="text-sm text-gray-500"><strong class="text-gray-700">Status:</strong> <span class="text-green-600 font-medium">In Stock (Indexed Live)</span></p>
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex items-center justify-between border-t border-gray-100">
                <span id="modalPrice" class="text-2xl font-black text-gray-900"></span>
                <button id="closeModalBtn" class="bg-gray-800 hover:bg-gray-900 text-white font-medium text-sm px-4 py-2 rounded-lg transition">Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
